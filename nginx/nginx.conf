events {
    worker_connections 1024;
}

http {
    # Define the backend upstream (the Express Node.js app)
    # In Docker Compose, services can communicate using their service names.
    # We will name our Express service "backend".
    upstream api_backend {
        server express-backend:5000;
    }

    server {
        # Nginx will listen on port 80 inside the container
        listen 80;

        # Used ONLY for Let's Encrypt verification
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Everything else redirects to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS SERVER
    #
    server {

        listen 443 ssl;
        server_name api.crowdscope.tech;

        ssl_certificate /etc/letsencrypt/live/api.crowdscope.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.crowdscope.tech/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {

            proxy_pass http://api_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
