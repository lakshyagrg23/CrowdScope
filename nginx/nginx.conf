events {
    worker_connections 1024;
}

http {
    # Define the backend upstream (the Express Node.js app)
    # In Docker Compose, services can communicate using their service names.
    # We will name our Express service "backend".
    upstream api_backend {
        server express-backend:5000;
    }

    server {
        # Nginx will listen on port 80 inside the container
        listen 80;

        # All requests coming to the root (/) or any sub-path
        # will be forwarded to the Express backend.
        location / {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
